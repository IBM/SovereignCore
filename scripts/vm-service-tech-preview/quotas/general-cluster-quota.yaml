apiVersion: quota.openshift.io/v1
kind: ClusterResourceQuota
metadata:
  name: vm-service-general-quota
  labels:
    app.kubernetes.io/name: vm-service
    app.kubernetes.io/component: quota
spec:
  selector:
    labels:
      matchLabels:
        app.kubernetes.io/managed-by: vm-service-broker
  quota:
    hard:
      # Compute resources
      requests.cpu: "50"
      requests.memory: 100Gi
      limits.cpu: "100"
      limits.memory: 200Gi
      
      # Storage resources
      persistentvolumeclaims: "50"
      requests.storage: "2Ti"
      
      # Object counts
      pods: "100"
      services: "50"
      secrets: "100"
      configmaps: "50"
      replicationcontrollers: "20"

